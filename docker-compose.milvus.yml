version: "3.9"

# Jalankan Milvus standalone untuk lokal development
# Usage: docker compose -f docker-compose.milvus.yml up -d

services:
  milvus-standalone:
    image: milvusdb/milvus:v2.3.4
    container_name: milvus-standalone
    command: milvus run standalone
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      COMMON_STORAGETYPE: local
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus-data:/var/lib/milvus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  milvus-data:
